<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#042C53"/>
  <rect x="0" y="0" width="32" height="32" rx="7" fill="none" stroke="#378ADD" stroke-width="0.5"/>

  <!-- Connections (drawn first) -->
  <line x1="16" y1="6" x2="9"  y2="13" stroke="#5b7ef5" stroke-width="0.7" opacity="0.7"/>
  <line x1="16" y1="6" x2="16" y2="13" stroke="#5b7ef5" stroke-width="0.7" opacity="0.7"/>
  <line x1="16" y1="6" x2="23" y2="13" stroke="#5b7ef5" stroke-width="0.7" opacity="0.7"/>

  <!-- Row 2 nodes -->
  <circle cx="9"  cy="13" r="2" fill="#5b7ef5"/>
  <circle cx="16" cy="13" r="2" fill="#5b7ef5"/>
  <circle cx="23" cy="13" r="2" fill="#5b7ef5"/>

  <!-- Row 1 node -->
  <circle cx="16" cy="6"  r="3"   fill="#378ADD"/>
  <circle cx="16" cy="6"  r="1.2" fill="#E6F1FB" opacity="0.95"/>

  <!-- Separator -->
  <line x1="3" y1="17" x2="29" y2="17" stroke="#378ADD" stroke-width="0.3" opacity="0.3"/>

  <!-- Rectangles — back first -->
  <rect x="11" y="25" width="14" height="4" rx="1.5" fill="#0C447C" stroke="#185FA5" stroke-width="0.4" opacity="0.6"/>
  <rect x="9"  y="22" width="14" height="4" rx="1.5" fill="#185FA5" stroke="#378ADD"  stroke-width="0.4" opacity="0.75"/>
  <rect x="7"  y="19" width="14" height="4" rx="1.5" fill="#378ADD" stroke="#85B7EB"  stroke-width="0.5"/>

  <!-- White lines on front rect -->
  <line x1="8.5" y1="20.5" x2="18"   y2="20.5" stroke="#E6F1FB" stroke-width="0.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="8.5" y1="22.5" x2="16.5" y2="22.5" stroke="#E6F1FB" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
</svg>
