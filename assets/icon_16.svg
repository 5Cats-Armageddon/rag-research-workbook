<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" rx="3.5" fill="#042C53"/>
  <rect x="0" y="0" width="16" height="16" rx="3.5" fill="none" stroke="#378ADD" stroke-width="0.4"/>

  <!-- Connections (drawn first) -->
  <line x1="8" y1="4" x2="4"  y2="8" stroke="#5b7ef5" stroke-width="0.6" opacity="0.7"/>
  <line x1="8" y1="4" x2="8"  y2="8" stroke="#5b7ef5" stroke-width="0.6" opacity="0.7"/>
  <line x1="8" y1="4" x2="12" y2="8" stroke="#5b7ef5" stroke-width="0.6" opacity="0.7"/>

  <!-- Row 2 nodes -->
  <circle cx="4"  cy="8" r="1.6" fill="#5b7ef5"/>
  <circle cx="8"  cy="8" r="1.6" fill="#5b7ef5"/>
  <circle cx="12" cy="8" r="1.6" fill="#5b7ef5"/>

  <!-- Row 1 node -->
  <circle cx="8" cy="4" r="2.2" fill="#378ADD"/>
  <circle cx="8" cy="4" r="0.9" fill="#E6F1FB" opacity="0.95"/>

  <!-- Separator -->
  <line x1="1.5" y1="10" x2="14.5" y2="10" stroke="#378ADD" stroke-width="0.3" opacity="0.3"/>

  <!-- Single front rectangle -->
  <rect x="3" y="11" width="10" height="3" rx="1" fill="#378ADD" stroke="#85B7EB" stroke-width="0.4"/>

  <!-- White line on front rect -->
  <line x1="5" y1="13" x2="11" y2="13" stroke="#E6F1FB" stroke-width="0.8" stroke-linecap="round" opacity="0.8"/>
</svg>
