<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#042C53"/>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="none" stroke="#378ADD" stroke-width="0.7"/>

  <!-- Connections (drawn first) -->
  <line x1="32" y1="11" x2="18" y2="23" stroke="#5b7ef5" stroke-width="0.9" opacity="0.7"/>
  <line x1="32" y1="11" x2="32" y2="23" stroke="#5b7ef5" stroke-width="0.9" opacity="0.7"/>
  <line x1="32" y1="11" x2="46" y2="23" stroke="#5b7ef5" stroke-width="0.9" opacity="0.7"/>

  <!-- Row 2 nodes -->
  <circle cx="18" cy="23" r="3.5" fill="#5b7ef5"/>
  <circle cx="32" cy="23" r="3.5" fill="#5b7ef5"/>
  <circle cx="46" cy="23" r="3.5" fill="#5b7ef5"/>

  <!-- Row 1 node -->
  <circle cx="32" cy="11" r="5"   fill="#378ADD"/>
  <circle cx="32" cy="11" r="2"   fill="#E6F1FB" opacity="0.95"/>

  <!-- Separator -->
  <line x1="6" y1="31" x2="58" y2="31" stroke="#378ADD" stroke-width="0.4" opacity="0.3"/>

  <!-- Rectangles — back first -->
  <rect x="17" y="48" width="38" height="8" rx="2" fill="#0C447C" stroke="#185FA5" stroke-width="0.4" opacity="0.6"/>
  <rect x="13" y="42" width="38" height="8" rx="2" fill="#185FA5" stroke="#378ADD"  stroke-width="0.5" opacity="0.75"/>
  <rect x="9"  y="36" width="38" height="8" rx="2" fill="#378ADD" stroke="#85B7EB"  stroke-width="0.6"/>

  <!-- White lines on front rect -->
  <line x1="13" y1="39" x2="39" y2="39" stroke="#E6F1FB" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
  <line x1="13" y1="43" x2="35" y2="43" stroke="#E6F1FB" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
