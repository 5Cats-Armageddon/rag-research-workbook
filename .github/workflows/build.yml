name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Write certificate to a temp file
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          # Create a temporary keychain
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate into the temporary keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "temp_password" build.keychain

          # Clean up temp file
          rm /tmp/certificate.p12

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git config --global core.safecrlf false

      - name: Install dependencies
        run: npm install

      - name: Build and sign macOS app
        env:
          CSC_KEYCHAIN: build.keychain
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EP_PRE_RELEASE: false
          PUBLISH_FOR_PULL_REQUEST: false
          USE_HARD_LINKS: false
        run: |
          # Find the certificate identity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Using identity: $IDENTITY"
          export CSC_NAME="$IDENTITY"
          CSC_IDENTITY_AUTO_DISCOVERY=false npm run build

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No DMG found, skipping notarization"
            exit 0
          fi
          echo "Notarizing: $DMG"

          # Submit and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json 2>&1)
          echo "Submit output: $SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

          if [ -z "$SUBMISSION_ID" ]; then
            echo "Could not get submission ID, trying --wait method"
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 20m
          else
            echo "Submission ID: $SUBMISSION_ID"
            echo "Polling for notarization status..."

            # Poll every 30 seconds for up to 20 minutes
            for i in $(seq 1 40); do
              sleep 30
              STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                --output-format json 2>/dev/null | python3 -c \
                "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "Unknown")
              echo "Attempt $i/40 — Status: $STATUS"

              if [ "$STATUS" = "Accepted" ]; then
                echo "Notarization accepted!"
                break
              elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
                echo "Notarization failed with status: $STATUS"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_ID_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID"
                exit 1
              fi
            done
          fi

          # Wait for Apple's CDN to propagate the ticket before stapling
          echo "Waiting 60 seconds for notarization ticket to propagate..."
          sleep 60

          # Staple with retries
          for attempt in 1 2 3; do
            echo "Staple attempt $attempt..."
            if xcrun stapler staple "$DMG"; then
              echo "Notarization and stapling complete!"
              break
            else
              if [ $attempt -lt 3 ]; then
                echo "Staple failed, waiting 30 seconds before retry..."
                sleep 30
              else
                echo "Warning: stapling failed after 3 attempts. The DMG is notarized but not stapled."
                echo "Users can still run the app — notarization is validated online."
              fi
            fi
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build:win
        env:
          EP_PRE_RELEASE: false
          PUBLISH_FOR_PULL_REQUEST: false
          USE_HARD_LINKS: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: dist/mac

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac/*.dmg
            dist/mac/*.zip
            dist/win/*.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
