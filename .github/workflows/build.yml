name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git to prevent accidental commits
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git config --global core.safecrlf false

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: CSC_IDENTITY_AUTO_DISCOVERY=false npm run build
        env:
          EP_DRAFT: true
          EP_PRE_RELEASE: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PUBLISH_FOR_PULL_REQUEST: false
          # Prevent electron-builder from writing version back to package.json
          USE_HARD_LINKS: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git to prevent accidental commits
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build:win
        env:
          EP_DRAFT: true
          EP_PRE_RELEASE: false
          PUBLISH_FOR_PULL_REQUEST: false
          USE_HARD_LINKS: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: dist/mac

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac/*.dmg
            dist/mac/*.zip
            dist/win/*.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
